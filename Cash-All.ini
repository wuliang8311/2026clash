;3、节点组
; 针对最新截图（包含应急节点、移动X3、电信、IPV6等）进行的全量匹配优化
custom_proxy_group=所有-手动`select`.*
custom_proxy_group=所有-自动`url-test`.*`http://www.gstatic.com/generate_204`180,5,100

; 匹配香港：包含香港、HK、HKT、🇭🇰、移动X3、IPV6X6
custom_proxy_group=香港-自动`url-test`(香港|HK|HKT|Hong Kong|🇭🇰|移动X3|IPV6X6)`http://www.gstatic.com/generate_204`180,5,100

; 匹配台湾：包含台湾、台灣、TW、🇹🇼、TVB、ISP
custom_proxy_group=台湾-自动`url-test`(台湾|台灣|TW|Tai Wan|🇹🇼|TVB|ISP)`http://www.gstatic.com/generate_204`180,5,100

; 匹配日本：包含日本、JP、🇯🇵、东京、大阪、应急节点
custom_proxy_group=日本-自动`url-test`(日本|JP|Japan|🇯🇵|东京|大阪|应急)`http://www.gstatic.com/generate_204`180,5,100

; 匹配新加坡：包含新加坡、SG、🇸🇬、坡、狮城、电信
custom_proxy_group=新加坡-自动`url-test`(新加坡|SG|Singapore|🇸🇬|坡|狮城|电信)`http://www.gstatic.com/generate_204`180,5,100

; 匹配韩国：包含韩国、韓國、KR、🇰🇷、首尔、春川
custom_proxy_group=韩国-自动`url-test`(韩国|韓國|KR|Korea|🇰🇷|首尔|春川)`http://www.gstatic.com/generate_204`180,5,100

; 匹配美国：包含美国、美、US、🇺🇸、洛杉矶、凤凰城、亚特兰大、应急线路
custom_proxy_group=美国-自动`url-test`(美国|美|US|United States|🇺🇸|洛杉矶|凤凰城|亚特兰大|应急|测试)`http://www.gstatic.com/generate_204`180,5,100

; 匹配其他：包含英国、德国、法国、澳大利亚、澳洲等
custom_proxy_group=其他-自动`url-test`(英国|UK|🇬🇧|德国|德|DE|🇩🇪|法国|法|FR|🇫🇷|澳大利亚|澳洲|AU|🇦🇺|泰|越|印|Australia)`http://www.gstatic.com/generate_204`180,5,100

